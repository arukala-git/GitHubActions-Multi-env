name: Deploy Multi Env

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/namespaces.yaml
        kubectl apply -f k8s/configmap-dev.yaml
        kubectl apply -f k8s/configmap-staging.yaml
        kubectl apply -f k8s/configmap-prod.yaml

        kubectl apply -f k8s/deployment.yaml -n dev
        kubectl apply -f k8s/deployment.yaml -n staging
        kubectl apply -f k8s/deployment.yaml -n prod